    <circle cx="0" cy="-44" r="22" fill="#FFF7ED"/>

    <circle cx="0" cy="-44" r="50" fill="none" stroke="#BAE6FD" stroke-width="8" stroke-opacity="0.95"/>
    <circle cx="0" cy="-44" r="76" fill="none" stroke="#BAE6FD" stroke-width="6" stroke-opacity="0.62"/>
  </g>
